name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - name: Build universal release binary
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Assemble ontode.app
        run: |
          BIN_PATH=$(swift build -c release --arch arm64 --arch x86_64 --show-bin-path)
          APP=build/ontode.app
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "$BIN_PATH/ontode" "$APP/Contents/MacOS/ontode"
          cp Sources/ontode/Resources/AppIcon.png "$APP/Contents/Resources/AppIcon.png"

          # Generate .icns from AppIcon.png for the About window / Dock / Finder
          ICONSET=build/AppIcon.iconset
          mkdir -p "$ICONSET"
          for SIZE in 16 32 64 128 256 512; do
            sips -z $SIZE $SIZE Sources/ontode/Resources/AppIcon.png --out "$ICONSET/icon_${SIZE}x${SIZE}.png" > /dev/null 2>&1
          done
          for SIZE in 32 64 256 512 1024; do
            HALF=$((SIZE / 2))
            sips -z $SIZE $SIZE Sources/ontode/Resources/AppIcon.png --out "$ICONSET/icon_${HALF}x${HALF}@2x.png" > /dev/null 2>&1
          done
          iconutil -c icns "$ICONSET" -o "$APP/Contents/Resources/AppIcon.icns"

          # Copy Credits.html for the About window
          cp Sources/ontode/Resources/Credits.html "$APP/Contents/Resources/Credits.html"

          for bundle in "$BIN_PATH"/*.bundle; do
            [ -e "$bundle" ] && cp -R "$bundle" "$APP/Contents/Resources/"
          done

          # Copy Sparkle.framework and SparkleCore.framework into the app bundle
          mkdir -p "$APP/Contents/Frameworks"
          SPARKLE_PATH=$(find .build -name "Sparkle.framework" -type d | head -1)
          if [ -n "$SPARKLE_PATH" ]; then
            cp -R "$SPARKLE_PATH" "$APP/Contents/Frameworks/"
          fi
          SPARKLE_CORE_PATH=$(find .build -name "SparkleCore.framework" -type d | head -1)
          if [ -n "$SPARKLE_CORE_PATH" ]; then
            cp -R "$SPARKLE_CORE_PATH" "$APP/Contents/Frameworks/"
          fi

          # The binary is built with rpath @executable_path/../lib by default.
          # Add Frameworks so it can find Sparkle.framework
          install_name_tool -add_rpath @executable_path/../Frameworks "$APP/Contents/MacOS/ontode"

          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>ontode</string>
              <key>CFBundleIdentifier</key>
              <string>dev.sid22.ontode</string>
              <key>CFBundleName</key>
              <string>ontode</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ steps.version.outputs.version }}</string>
              <key>CFBundleVersion</key>
              <string>${{ github.run_number }}</string>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSHumanReadableCopyright</key>
              <string>Created by Siddharth Goyal</string>
              <key>SUPublicEDKey</key>
              <string>UtNQXk2Nc/8bt5hP/Ile72Mf8JPhjsP1uJxwaJ3p9Mo=</string>
              <key>SUFeedURL</key>
              <string>https://github.com/sid22/ontode/releases/latest/download/appcast.xml</string>
              <key>SUEnableAutomaticChecks</key>
              <true/>
          </dict>
          </plist>
          PLIST
          codesign --force --deep --sign - "$APP"

      - name: Create DMG
        run: |
          mkdir -p build/dmg
          cp -R build/ontode.app build/dmg/
          ln -s /Applications build/dmg/Applications
          hdiutil create -volname ontode -srcfolder build/dmg -ov -format UDZO build/ontode.dmg

      - name: Sign DMG
        id: sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          cat > sign.swift <<'EOF'
          import Foundation
          import CryptoKit
          guard let keyB64 = ProcessInfo.processInfo.environment["SPARKLE_PRIVATE_KEY"], !keyB64.isEmpty else {
              FileHandle.standardError.write(Data("SPARKLE_PRIVATE_KEY secret is not set\n".utf8))
              exit(1)
          }
          guard let seed = Data(base64Encoded: keyB64), seed.count == 32 else {
              FileHandle.standardError.write(Data("SPARKLE_PRIVATE_KEY is not a base64-encoded 32-byte seed\n".utf8))
              exit(1)
          }
          let privateKey = try! Curve25519.Signing.PrivateKey(rawRepresentation: seed)
          let dmgData = try! Data(contentsOf: URL(fileURLWithPath: "build/ontode.dmg"))
          let signature = try! privateKey.signature(for: dmgData)
          print("sig=\(signature.base64EncodedString())")
          EOF
          swift sign.swift >> $GITHUB_OUTPUT

      - name: Generate appcast.xml
        run: |
          DMG_SIZE=$(stat -f%z build/ontode.dmg)
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${GITHUB_REF#refs/tags/}"
          DATE=$(date -u +"%a, %d %b %Y %H:%M:%S %z")

          cat > build/appcast.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>ontode</title>
              <link>https://github.com/sid22/ontode</link>
              <description>ontode updates</description>
              <language>en</language>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${DATE}</pubDate>
                <sparkle:version>${{ github.run_number }}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <sparkle:edSignature>${{ steps.sign.outputs.sig }}</sparkle:edSignature>
                <enclosure url="https://github.com/sid22/ontode/releases/download/${TAG}/ontode.dmg"
                           length="${DMG_SIZE}"
                           type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ontode ${{ steps.version.outputs.version }}
          body: |
            ## ontode ${{ steps.version.outputs.version }}

            Download `ontode.dmg` below, open it, and drag ontode to your Applications folder.

            Existing users will be notified of this update automatically.
          files: |
            build/ontode.dmg
            build/appcast.xml
