name: Build DMG

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Build universal release binary
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Assemble ontode.app
        run: |
          BIN_PATH=$(swift build -c release --arch arm64 --arch x86_64 --show-bin-path)
          APP=build/ontode.app
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "$BIN_PATH/ontode" "$APP/Contents/MacOS/ontode"
          cp Sources/ontode/Resources/AppIcon.png "$APP/Contents/Resources/AppIcon.png"

          # Generate .icns from AppIcon.png for the About window / Dock / Finder
          ICONSET=build/AppIcon.iconset
          mkdir -p "$ICONSET"
          for SIZE in 16 32 64 128 256 512; do
            sips -z $SIZE $SIZE Sources/ontode/Resources/AppIcon.png --out "$ICONSET/icon_${SIZE}x${SIZE}.png" > /dev/null 2>&1
          done
          for SIZE in 32 64 256 512 1024; do
            HALF=$((SIZE / 2))
            sips -z $SIZE $SIZE Sources/ontode/Resources/AppIcon.png --out "$ICONSET/icon_${HALF}x${HALF}@2x.png" > /dev/null 2>&1
          done
          iconutil -c icns "$ICONSET" -o "$APP/Contents/Resources/AppIcon.icns"

          # Copy Credits.html for the About window
          cp Sources/ontode/Resources/Credits.html "$APP/Contents/Resources/Credits.html"

          for bundle in "$BIN_PATH"/*.bundle; do
            [ -e "$bundle" ] && cp -R "$bundle" "$APP/Contents/Resources/"
          done

          # Copy Sparkle.framework into the app bundle
          SPARKLE_PATH=$(find .build -path "*/artifacts/Sparkle/Sparkle.framework" -type d | head -1)
          if [ -n "$SPARKLE_PATH" ]; then
            mkdir -p "$APP/Contents/Frameworks"
            cp -R "$SPARKLE_PATH" "$APP/Contents/Frameworks/"
          fi

          cat > "$APP/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>ontode</string>
              <key>CFBundleIdentifier</key>
              <string>dev.sid22.ontode</string>
              <key>CFBundleName</key>
              <string>ontode</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>CFBundleShortVersionString</key>
              <string>0.0.0-dev</string>
              <key>CFBundleVersion</key>
              <string>0</string>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSHumanReadableCopyright</key>
              <string>Created by Siddharth Goyal</string>
              <key>SUFeedURL</key>
              <string>https://github.com/sid22/ontode/releases/latest/download/appcast.xml</string>
              <key>SUEnableAutomaticChecks</key>
              <true/>
          </dict>
          </plist>
          PLIST
          codesign --force --deep --sign - "$APP"

      - name: Create DMG
        run: |
          mkdir -p build/dmg
          cp -R build/ontode.app build/dmg/
          ln -s /Applications build/dmg/Applications
          hdiutil create -volname ontode -srcfolder build/dmg -ov -format UDZO build/ontode.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v6
        with:
          name: ontode-dmg
          path: build/ontode.dmg
